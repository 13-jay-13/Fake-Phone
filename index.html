<!DOCTYPE html>
<html lang="en-IE">
    <head>
        <meta charset="UTF-8">

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        >

        <meta
            name="description"
            content="Nadia's Phone"
        >

        <meta
            name="theme-color"
            content="#000000"
        >

        <title>Nadia's Phone</title>

        <link
            rel="stylesheet"
            href="css/main.css"
        >

        <link
            rel="stylesheet"
            href="css/home.css"
        >
    </head>

    <body>

        <div id="phone">

            <!-- Wallpaper -->

            <div id="wallpaper"></div>

            <!-- Status Bar -->

            <header class="status-bar">

                <div class="status-left">
                    Vodafone IE
                </div>

                <div
                    class="status-center"
                    id="clock"
                >
                    17:42
                </div>

                <div class="status-right">

                    <span id="signal">
                        ●●●●
                    </span>

                    <span id="battery">
                        84%
                    </span>

                </div>

            </header>
            <main class="home-screen">
                <div class="app-grid">
                    <a
                        href="apps/photos.html"
                        class="app-icon"
                        aria-label="Photos"
                    >
                        <div class="icon photos"></div>
                        <span>Photos</span>
                    </a>
                    <a
                        href="apps/calendar.html"
                        class="app-icon"
                        aria-label="Calendar"
                    >
                        <div class="icon calendar"></div>
                        <span>Calendar</span>
                    </a>
                    <a
                    href="apps/notes.html"
                    class="app-icon"
                    aria-label="Notes"
                >
                    <div class="icon notes"></div>
                    <span>Notes</span>
                    </a>
                </div>
            </main>
            <footer class="dock">
                <a
                    href="apps/phone.html"
                    class="dock-icon"
                    aria-label="Phone"
                >
                    <div class="icon phone"></div>
                </a>
                <a
                    href="apps/messages.html"
                    class="dock-icon"
                    aria-label="Messages"
                >
                    <div class="icon messages"></div>
                </a>
            </footer>
            <button
                id="homeButton"
                data-home="index.html"
                aria-label="Home Button"
            ></button>

        </div>

        <script
            src="js/phone.js"
            defer
        ></script>

        <script
            src="js/clock.js"
            defer
        ></script>

    </body>
</html>
